<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧬 智能进化工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
            color: #e94560;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e94560;
        }
        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
        }
        .stat-box .number {
            font-size: 2em;
            font-weight: bold;
            color: #4ecca3;
        }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { color: #e94560; padding: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧬 智能进化工作台</h1>
        <div>实时监控 AI 智能水平、记忆状态、进化过程</div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h2>🧠 记忆系统</h2>
            <div id="memory-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>🧬 进化统计</h2>
            <div id="evolution-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📊 智能评分</h2>
            <div id="intelligence-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/overview');
                const data = await response.json();
                
                // 更新记忆系统
                document.getElementById('memory-stats').innerHTML = `
                    <div class="stat-box">
                        <div class="number">${data.memory.working_count}</div>
                        <div>工作记忆</div>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.memory.vector_count}</div>
                        <div>向量记忆</div>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.memory.kg_entities}</div>
                        <div>知识实体</div>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.memory.kg_relations}</div>
                        <div>知识关系</div>
                    </div>
                `;
                
                // 更新进化统计
                document.getElementById('evolution-stats').innerHTML = `
                    <div class="stat-box">
                        <div class="number">${data.evolution.total_events}</div>
                        <div>总事件</div>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.evolution.today_events}</div>
                        <div>今日事件</div>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.evolution.bugs_fixed}</div>
                        <div>已修复Bug</div>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.evolution.bugs_pending}</div>
                        <div>待修复Bug</div>
                    </div>
                `;
                
                // 更新智能评分
                document.getElementById('intelligence-stats').innerHTML = `
                    <div class="stat-box">
                        <div class="number">${data.intelligence.percentage}%</div>
                        <div>智能评分 [${data.intelligence.grade}级]</div>
                    </div>
                    <div style="margin-top: 15px;">
                        ${Object.entries(data.intelligence.dimensions).map(([k, v]) => `
                            <div style="margin: 5px 0;">
                                ${k}: ${'█'.repeat(v)}${'░'.repeat(5-v)} ${v}/5
                            </div>
                        `).join('')}
                    </div>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                document.querySelectorAll('.card > div').forEach(el => {
                    el.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
                });
            }
        }
        
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
