<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧬 智能进化工作台 - 增强版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .stat-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 15px;
        }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .progress-bar {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s;
        }
        .knowledge-item {
            padding: 15px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            max-width: 1000px;
            border-radius: 20px;
        }
        .close-btn {
            float: right;
            font-size: 2em;
            cursor: pointer;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 智能进化工作台 - 增强版</h1>
            <p style="color: #666; font-size: 1.2em;">Self-Evolution Dashboard Enhanced</p>
            <div class="btn-group">
                <button class="btn" onclick="showModal('knowledge')">📚 知识库</button>
                <button class="btn" onclick="showModal('learning')">📖 学习日志</button>
                <button class="btn" onclick="showModal('showcase')">📊 能力展示</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📊 核心指标</h2>
                <div class="stat-card">
                    <div class="stat-value" id="total-knowledge">0</div>
                    <div class="stat-label">知识库条目</div>
                </div>
                <div style="margin-top: 20px;">
                    <div class="stat-card" style="margin-bottom: 10px;">
                        <div class="stat-value" id="total-logs">0</div>
                        <div class="stat-label">学习日志</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>🏆 领域分布</h2>
                <div id="domain-tags"></div>
            </div>

            <div class="card">
                <h2>📈 难度分布</h2>
                <div id="difficulty-bars"></div>
            </div>

            <div class="card">
                <h2>🔥 最近学习</h2>
                <div id="recent-learning"></div>
            </div>
        </div>
    </div>

    <!-- 知识库模态框 -->
    <div id="knowledge-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('knowledge')">&times;</span>
            <h2 style="color: #667eea; margin-bottom: 20px;">📚 知识库</h2>
            <div id="knowledge-content"></div>
        </div>
    </div>

    <!-- 学习日志模态框 -->
    <div id="learning-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('learning')">&times;</span>
            <h2 style="color: #667eea; margin-bottom: 20px;">📖 学习日志</h2>
            <div id="learning-content"></div>
        </div>
    </div>

    <!-- 能力展示模态框 -->
    <div id="showcase-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('showcase')">&times;</span>
            <h2 style="color: #667eea; margin-bottom: 20px;">📊 能力展示</h2>
            <div id="showcase-content"></div>
        </div>
    </div>

    <script>
        let kbData = null;
        let logsData = null;

        async function loadData() {
            try {
                const [kbRes, logsRes] = await Promise.all([
                    fetch('/api/knowledge-base'),
                    fetch('/api/learning-log')
                ]);
                kbData = await kbRes.json();
                logsData = await logsRes.json();
                updateDashboard();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function updateDashboard() {
            if (!kbData || !kbData.success) return;

            const stats = kbData.data;
            document.getElementById('total-knowledge').textContent = stats.total || 0;
            document.getElementById('total-logs').textContent = logsData ? logsData.total || 0 : 0;

            // 领域标签
            const domainHtml = (stats.by_domain || []).slice(0, 6).map(d => 
                `<span class="tag">${d.domain}: ${d.count}</span>`
            ).join('');
            document.getElementById('domain-tags').innerHTML = domainHtml;

            // 难度条
            const diffHtml = (stats.by_difficulty || []).map(d => `
                <div style="margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>${d.difficulty || '未分类'}</span>
                        <span>${d.count}条</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${(d.count / stats.total) * 100}%"></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('difficulty-bars').innerHTML = diffHtml;

            // 最近学习
            const recentHtml = (stats.recent || []).slice(0, 5).map(k => `
                <div class="knowledge-item">
                    <strong>${k.domain} > ${k.subtopic}</strong>
                    <p style="color: #666; margin-top: 5px;">${k.content}</p>
                </div>
            `).join('');
            document.getElementById('recent-learning').innerHTML = recentHtml;
        }

        function showModal(type) {
            document.getElementById(type + '-modal').style.display = 'block';
            if (type === 'knowledge') showKnowledge();
            if (type === 'learning') showLearning();
            if (type === 'showcase') showShowcase();
        }

        function closeModal(type) {
            document.getElementById(type + '-modal').style.display = 'none';
        }

        function showKnowledge() {
            if (!kbData || !kbData.success) return;
            const stats = kbData.data;
            let html = '<h3>📊 统计概览</h3>';
            html += `<p>总知识数：<strong>${stats.total}</strong></p>`;
            html += '<h4>领域分布</h4><div style="margin-bottom: 20px;">';
            html += (stats.by_domain || []).map(d => `<span class="tag">${d.domain}: ${d.count}</span>`).join('');
            html += '</div>';
            html += '<h4>难度分布</h4><div>';
            html += (stats.by_difficulty || []).map(d => `<span class="tag">${d.difficulty || '未分类'}: ${d.count}</span>`).join('');
            html += '</div>';
            document.getElementById('knowledge-content').innerHTML = html;
        }

        function showLearning() {
            if (!logsData) return;
            const logs = logsData.logs || [];
            let html = logs.map(log => `
                <div class="knowledge-item">
                    <strong>${log.type || '学习'}: ${log.content || 'N/A'}</strong>
                    <p style="color: #666; margin-top: 5px;">💡 ${log.收获 || log.content || 'N/A'}</p>
                    <p style="color: #999; font-size: 0.9em; margin-top: 5px;">📅 ${log.timestamp ? log.timestamp.replace('T', ' ').substring(0, 19) : 'N/A'}</p>
                </div>
            `).join('');
            if (!html) html = '<p>暂无学习记录</p>';
            document.getElementById('learning-content').innerHTML = html;
        }

        function showShowcase() {
            document.getElementById('showcase-content').innerHTML = '<p>能力展示功能开发中...</p>';
        }

        // 初始化
        loadData();
        setInterval(loadData, 10000);

        // 点击外部关闭模态框
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
