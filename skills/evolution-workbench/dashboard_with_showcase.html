<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能进化工作台 - 含自我学习展示 v3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.2em; margin-bottom: 10px; }
        .showcase-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .showcase-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(100, 181, 246, 0.2);
        }
        h2 {
            color: #64b5f6;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #64b5f6;
            font-size: 1.3em;
        }
        .stat-item {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4fc3f7;
        }
        .stat-label {
            color: #90a4ae;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #607d8b;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #607d8b;
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        /* Showcase Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: #1a1a2e;
            margin: 5% auto;
            padding: 40px;
            max-width: 1200px;
            border-radius: 12px;
            border: 2px solid #667eea;
        }
        .close-btn {
            float: right;
            font-size: 2em;
            cursor: pointer;
            color: #64b5f6;
        }
        .close-btn:hover { color: #fff; }
        .showcase-section {
            margin-bottom: 30px;
        }
        .showcase-section h3 {
            color: #64b5f6;
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(100, 181, 246, 0.3);
        }
        .progress-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 25px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧬 智能进化工作台</h1>
        <div>Self-Evolution Dashboard with Learning Showcase</div>
        <button class="showcase-btn" onclick="showLearningShowcase()">
            📊 查看自我学习展示
        </button>
    </div>
    
    <div class="grid">
        <div class="card">
            <h2>📊 核心指标</h2>
            <div id="core-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📚 学习内容</h2>
            <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 15px;" id="learning-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📦 沙箱实例</h2>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <th style="text-align: left; padding: 10px; color: #64b5f6;">需求</th>
                        <th style="text-align: left; padding: 10px; color: #64b5f6;">状态</th>
                        <th style="text-align: left; padding: 10px; color: #64b5f6;">结果</th>
                    </tr>
                </thead>
                <tbody id="instances-body">
                    <tr><td colspan="3" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>🐛 Bug 追踪</h2>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <th style="text-align: left; padding: 10px; color: #64b5f6;">类型</th>
                        <th style="text-align: left; padding: 10px; color: #64b5f6;">严重度</th>
                        <th style="text-align: left; padding: 10px; color: #64b5f6;">描述</th>
                    </tr>
                </thead>
                <tbody id="bugs-body">
                    <tr><td colspan="3" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="card" style="grid-column: 1 / -1;">
            <h2>⏱️ 进化时间线</h2>
            <div class="timeline" id="timeline">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        自动刷新 (10 秒) | 最后更新：<span id="time">--:--:--</span>
    </div>
    
    <!-- Showcase Modal -->
    <div id="showcase-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeShowcase()">&times;</span>
            <h2 style="text-align: center; margin-bottom: 30px;">🧠 自我学习能力展示</h2>
            <div id="showcase-content">
                <div class="loading">加载展示报告中...</div>
            </div>
        </div>
    </div>
    
    <script>
        function safeGet(obj, path, defaultVal) {
            const keys = path.split('.');
            let result = obj;
            for (const key of keys) {
                if (result === null || result === undefined) return defaultVal;
                result = result[key];
            }
            return result !== undefined && result !== null ? result : defaultVal;
        }
        
        async function loadDashboard() {
            try {
                const [overviewRes, instancesRes, bugsRes, eventsRes] = await Promise.all([
                    fetch('/api/overview'),
                    fetch('/api/instances'),
                    fetch('/api/bugs'),
                    fetch('/api/evolution/history')
                ]);
                
                const overview = await overviewRes.json();
                const instances = await instancesRes.json();
                const bugs = await bugsRes.json();
                const events = await eventsRes.json();
                
                // 核心指标
                document.getElementById('core-stats').innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${overview.memory?.total_size_mb || 0}</div>
                        <div class="stat-label">记忆大小 (MB)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${overview.evolution?.total_events || 0}</div>
                        <div class="stat-label">进化事件</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${overview.intelligence?.percentage || 0}%</div>
                        <div class="stat-label">智能评分</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${overview.intelligence?.grade || '-'}</div>
                        <div class="stat-label">评级</div>
                    </div>
                `;
                
                // 学习内容
                const learningRes = await fetch('/api/learning-stats');
                const learningStats = await learningRes.json();
                document.getElementById('learning-content').innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${learningStats.scheduled || 0}</div>
                        <div class="stat-label">定时学习</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${learningStats.evolution || 0}</div>
                        <div class="stat-label">进化检查</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${learningStats.reflection || 0}</div>
                        <div class="stat-label">每日反思</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${learningStats.insights || 0}</div>
                        <div class="stat-label">洞察生成</div>
                    </div>
                `;
                
                // 实例列表
                const instancesHtml = instances.slice(0,10).map(i => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 10px;">${i.requirement_id}</td>
                        <td style="padding: 10px;">
                            <span class="tag" style="background: ${i.status === 'RUNNING' ? 'rgba(78, 204, 163, 0.3)' : i.status === 'COMPLETED' ? 'rgba(102, 181, 246, 0.3)' : 'rgba(249, 168, 37, 0.3)'}; color: ${i.status === 'RUNNING' ? '#4ecca3' : i.status === 'COMPLETED' ? '#64b5f6' : '#ffb74d'}; padding: 3px 10px; border-radius: 12px;">
                                ${i.status}
                            </span>
                        </td>
                        <td style="padding: 10px;">${i.results ? (i.results.passed || 0) + '/' + ((i.results.passed || 0) + (i.results.failed || 0)) : '-'}</td>
                    </tr>
                `).join('');
                document.getElementById('instances-body').innerHTML = instancesHtml || '<tr><td colspan="3" class="loading">无数据</td></tr>';
                
                // Bug 列表
                const bugsHtml = bugs.slice(0,10).map(b => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 10px;">${b.bug_type}</td>
                        <td style="padding: 10px;">
                            <span class="tag" style="background: ${b.severity === 'CRITICAL' ? 'rgba(244, 67, 54, 0.3)' : b.severity === 'HIGH' ? 'rgba(255, 152, 0, 0.3)' : 'rgba(102, 181, 246, 0.3)'}; color: ${b.severity === 'CRITICAL' ? '#e57373' : b.severity === 'HIGH' ? '#ffb74d' : '#64b5f6'}; padding: 3px 10px; border-radius: 12px;">
                                ${b.severity}
                            </span>
                        </td>
                        <td style="padding: 10px;">${b.description ? b.description.slice(0,50) + '...' : '-'}</td>
                    </tr>
                `).join('');
                document.getElementById('bugs-body').innerHTML = bugsHtml || '<tr><td colspan="3" class="loading">无数据</td></tr>';
                
                // 时间线
                const timelineHtml = events.slice(0,15).map(e => {
                    const timestamp = safeGet(e, 'timestamp', '');
                    const time = timestamp ? timestamp.substring(11, 19) : '--:--:--';
                    return `
                        <div style="position: relative; padding: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.2); border-radius: 6px; border-left: 3px solid #4fc3f7;">
                            <div style="font-size: 0.8em; color: #90a4ae; margin-bottom: 5px;">${time}</div>
                            <div>${safeGet(e, 'event_type', '-')}: ${safeGet(e, 'description', '-')}</div>
                        </div>
                    `;
                }).join('');
                document.getElementById('timeline').innerHTML = timelineHtml || '<div class="loading">无数据</div>';
                
                document.getElementById('time').textContent = new Date().toLocaleTimeString();
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        // Showcase functions
        function showLearningShowcase() {
            document.getElementById('showcase-modal').style.display = 'block';
            loadShowcaseContent();
        }
        
        function closeShowcase() {
            document.getElementById('showcase-modal').style.display = 'none';
        }
        
        async function loadShowcaseContent() {
            try {
                const response = await fetch('/api/showcase');
                const data = await response.json();
                
                document.getElementById('showcase-content').innerHTML = `
                    <div class="showcase-section">
                        <h3>📊 学习概览</h3>
                        <div class="stat-item">
                            <div class="stat-value">${data.metrics?.scheduled_learning_count || 0}</div>
                            <div class="stat-label">定时学习次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.metrics?.evolution_checks_count || 0}</div>
                            <div class="stat-label">进化检查次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.metrics?.daily_reflections_count || 0}</div>
                            <div class="stat-label">每日反思次数</div>
                        </div>
                    </div>
                    
                    <div class="showcase-section">
                        <h3>📈 能力成长</h3>
                        ${Object.entries(data.capabilities || {}).map(([cap, vals]) => `
                            <div style="margin-bottom: 15px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                    <span>${cap}</span>
                                    <span>${vals.initial} → ${vals.current} (${vals.growth})</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${(vals.current / 7) * 100}%"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="showcase-section">
                        <h3>⚡ 学习速度</h3>
                        <div class="stat-item">
                            <div class="stat-value">${data.velocity?.per_hour || 0}</div>
                            <div class="stat-label">每小时学习事件</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.velocity?.per_day || 0}</div>
                            <div class="stat-label">每天学习事件</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.velocity?.trend || 'stable'}</div>
                            <div class="stat-label">趋势</div>
                        </div>
                    </div>
                `;
            } catch (e) {
                console.error('Error loading showcase:', e);
                document.getElementById('showcase-content').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('showcase-modal');
            if (event.target === modal) {
                closeShowcase();
            }
        }
        
        loadDashboard();
        setInterval(loadDashboard, 10000);
    </script>
</body>
</html>
