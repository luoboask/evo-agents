<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🧬 智能进化工作台</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; background: white; padding: 30px; border-radius: 15px; margin-bottom: 20px; }
        .header h1 { color: #667eea; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card h2 { color: #667eea; margin-bottom: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .stat { text-align: center; padding: 15px; background: #f5f5f5; border-radius: 10px; margin-bottom: 10px; }
        .stat-value { font-size: 2em; font-weight: bold; color: #667eea; }
        .tag { display: inline-block; padding: 5px 10px; background: #667eea; color: white; border-radius: 15px; margin: 3px; font-size: 0.85em; }
        .btn { padding: 12px 25px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1em; margin: 5px; }
        .btn:hover { opacity: 0.9; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; max-width: 900px; border-radius: 15px; }
        .close { float: right; font-size: 2em; cursor: pointer; color: #667eea; }
        .item { padding: 15px; background: #f9f9f9; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 智能进化工作台</h1>
            <p>Self-Evolution Dashboard - 知识库：<span id="kb-total">加载中...</span>条</p>
            <button class="btn" onclick="showModal('kb')">📚 知识库</button>
            <button class="btn" onclick="showModal('logs')">📖 学习日志</button>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📊 知识库统计</h2>
                <div class="stat">
                    <div class="stat-value" id="total-count">0</div>
                    <div>总知识数</div>
                </div>
                <div id="domain-tags"></div>
            </div>
            
            <div class="card">
                <h2>📈 难度分布</h2>
                <div id="difficulty-bars"></div>
            </div>
            
            <div class="card">
                <h2>🔥 最近学习</h2>
                <div id="recent-list"></div>
            </div>
        </div>
    </div>
    
    <!-- 知识库模态框 -->
    <div id="kb-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('kb')">&times;</span>
            <h2>📚 知识库详情</h2>
            <div id="kb-content"></div>
        </div>
    </div>
    
    <!-- 学习日志模态框 -->
    <div id="logs-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('logs')">&times;</span>
            <h2>📖 学习日志</h2>
            <div id="logs-content"></div>
        </div>
    </div>
    
    <script>
        let kbData = null;
        
        async function loadData() {
            try {
                const res = await fetch('/api/knowledge-base');
                kbData = await res.json();
                if (kbData.success) {
                    updateDashboard(kbData.data);
                }
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('kb-total').textContent = '加载失败';
            }
        }
        
        function updateDashboard(stats) {
            document.getElementById('kb-total').textContent = stats.total;
            document.getElementById('total-count').textContent = stats.total;
            
            // 领域标签
            const domains = (stats.by_domain || []).slice(0, 6);
            document.getElementById('domain-tags').innerHTML = domains.map(d => 
                `<span class="tag">${d.domain}: ${d.count}</span>`
            ).join('');
            
            // 难度条
            const diffs = stats.by_difficulty || [];
            document.getElementById('difficulty-bars').innerHTML = diffs.map(d => `
                <div style="margin-bottom: 10px;">
                    <div style="display:flex;justify-content:space-between;">
                        <span>${d.difficulty||'未分类'}</span>
                        <span>${d.count}条</span>
                    </div>
                    <div style="background:#eee;height:20px;border-radius:10px;overflow:hidden;">
                        <div style="width:${(d.count/stats.total)*100}%;height:100%;background:linear-gradient(90deg,#667eea,#764ba2);"></div>
                    </div>
                </div>
            `).join('');
            
            // 最近学习
            const recent = (stats.recent || []).slice(0, 5);
            document.getElementById('recent-list').innerHTML = recent.map(k => `
                <div class="item">
                    <strong>${k.domain} > ${k.subtopic}</strong>
                    <p style="color:#666;margin:5px 0 0 0;font-size:0.9em;">${k.content}</p>
                </div>
            `).join('');
        }
        
        function showModal(type) {
            document.getElementById(type + '-modal').style.display = 'block';
            if (type === 'kb' && kbData) {
                const stats = kbData.data;
                document.getElementById('kb-content').innerHTML = `
                    <p><strong>总知识数：</strong>${stats.total}</p>
                    <h3>领域分布</h3>
                    <div>${(stats.by_domain||[]).map(d=>`<span class="tag">${d.domain}:${d.count}</span>`).join('')}</div>
                    <h3 style="margin-top:20px;">难度分布</h3>
                    <div>${(stats.by_difficulty||[]).map(d=>`<span class="tag">${d.difficulty||'未分类'}:${d.count}</span>`).join('')}</div>
                `;
            }
            if (type === 'logs') {
                document.getElementById('logs-content').innerHTML = '<p>学习日志功能开发中...</p>';
            }
        }
        
        function closeModal(type) {
            document.getElementById(type + '-modal').style.display = 'none';
        }
        
        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        };
        
        // 初始化
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
