# Agent Configuration
#
# Define your agent(s) here.
# Each agent gets its own data directory under data/<name>/

# Example:
# my-agent:
#   name: my-agent
#   role: assistant
#   description: "My agent"
#   data_path: data/my-agent
#   settings:
#     max_memories: 1000
#     auto_cleanup: false

# Sub-agent: pinterest-agent
pinterest-agent:
  name: pinterest-agent
  role: pinterest
  data_path: agents/pinterest-agent/data
  memory_path: agents/pinterest-agent/memory

# Sub-agent: xhs-agent
xhs-agent:
  name: xhs-agent
  role: xhs
  data_path: agents/xhs-agent/data
  memory_path: agents/xhs-agent/memory
