<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MTOP Mock 测试页面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 20px; }
    .status { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status h2 { font-size: 18px; margin-bottom: 15px; color: #0af; }
    .status-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .status-item:last-child { border-bottom: none; }
    .status-label { color: #666; }
    .status-value { font-weight: bold; }
    .status-value.ok { color: #52c41a; }
    .status-value.error { color: #ff4d4f; }
    .test-section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .test-section h2 { font-size: 18px; margin-bottom: 15px; color: #333; }
    button { background: #1890ff; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-right: 10px; margin-bottom: 10px; font-size: 14px; }
    button:hover { background: #40a9ff; }
    button:disabled { background: #d9d9d9; cursor: not-allowed; }
    .result { background: #fafafa; border: 1px solid #d9d9d9; border-radius: 4px; padding: 15px; margin-top: 15px; max-height: 400px; overflow: auto; font-family: "Monaco", "Consolas", monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    .result.success { border-color: #52c41a; background: #f6ffed; }
    .result.error { border-color: #ff4d4f; background: #fff2f0; }
    .log { background: #001529; color: #52c41a; padding: 15px; border-radius: 4px; margin-top: 15px; max-height: 300px; overflow: auto; font-family: "Monaco", "Consolas", monospace; font-size: 12px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    .product-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .product-image { width: 100%; height: 250px; object-fit: cover; background: #f0f0f0; }
    .product-info { padding: 15px; }
    .product-title { font-size: 14px; color: #333; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .product-price { display: flex; align-items: baseline; gap: 10px; }
    .price-sale { font-size: 20px; font-weight: bold; color: #ff4d4f; }
    .price-original { font-size: 14px; color: #999; text-decoration: line-through; }
    .discount-tag { background: linear-gradient(90deg, #ff6b6b, #ff4d4f); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔌 MTOP Mock 测试页面</h1>
    
    <!-- 状态面板 -->
    <div class="status">
      <h2>📊 Mock 状态</h2>
      <div class="status-item">
        <span class="status-label">Mock 拦截器</span>
        <span class="status-value" id="mock-enabled">检测中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">拦截次数</span>
        <span class="status-value" id="intercept-count">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">已配置 API</span>
        <span class="status-value" id="api-count">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">最后拦截</span>
        <span class="status-value" id="last-api">-</span>
      </div>
    </div>

    <!-- 测试按钮 -->
    <div class="test-section">
      <h2>🧪 测试接口</h2>
      <button onclick="testRecommend()">测试商品推荐</button>
      <button onclick="testGuidePage()">测试导购页面</button>
      <button onclick="testPopupCheck()">测试弹窗检查</button>
      <button onclick="testWishlist()">测试心愿单</button>
      <button onclick="clearLog()">清空日志</button>
      
      <div class="log" id="log"></div>
    </div>

    <!-- 商品展示 -->
    <div class="test-section">
      <h2>🛍️ 商品展示（推荐接口）</h2>
      <button onclick="loadProducts()">加载商品</button>
      <div class="product-grid" id="product-grid"></div>
    </div>

    <!-- 原始响应 -->
    <div class="test-section">
      <h2>📄 原始响应</h2>
      <div class="result" id="result">点击测试按钮查看结果</div>
    </div>
  </div>

  <!-- 加载 Mock 拦截器 -->
  <script src="./mtop-mock.js"></script>
  
  <!-- 加载 MTOP 库 -->
  <script src="https://g.alicdn.com/mtb/lib-mtop/2.7.2/mtop.js"></script>

  <script>
    // 日志函数
    function log(message, type = 'info') {
      const logEl = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : '📝';
      logEl.innerHTML += `[${timestamp}] ${prefix} ${message}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
      log('日志已清空');
    }

    // 显示结果
    function showResult(data, success = true) {
      const resultEl = document.getElementById('result');
      resultEl.className = 'result ' + (success ? 'success' : 'error');
      resultEl.textContent = JSON.stringify(data, null, 2);
    }

    // 更新状态
    function updateStatus() {
      const status = window.__MTOP_MOCK_STATUS__;
      const enabledEl = document.getElementById('mock-enabled');
      const countEl = document.getElementById('intercept-count');
      const apiEl = document.getElementById('api-count');
      const lastEl = document.getElementById('last-api');

      if (status) {
        enabledEl.textContent = status.enabled ? '✅ 已激活' : '❌ 未激活';
        enabledEl.className = 'status-value ' + (status.enabled ? 'ok' : 'error');
        countEl.textContent = status.interceptedCount || 0;
        apiEl.textContent = (status.mockedAPIs || []).length;
        lastEl.textContent = status.lastAPI || '-';
      } else {
        enabledEl.textContent = '❌ 未检测到';
        enabledEl.className = 'status-value error';
      }
    }

    // 测试商品推荐
    function testRecommend() {
      log('调用商品推荐接口...');
      
      if (window.mtop && window.mtop.request) {
        mtop.request('mtop.relationrecommend.tiantaojprecommend.recommend', {
          data: { page: 1, pageSize: 10 }
        }, (err, data) => {
          if (err) {
            log('请求失败：' + JSON.stringify(err), 'error');
            showResult(err, false);
          } else {
            log('请求成功！', 'success');
            showResult(data);
            updateStatus();
          }
        });
      } else {
        log('mtop.request 不可用', 'error');
      }
    }

    // 测试导购页面
    function testGuidePage() {
      log('调用导购页面接口...');
      
      if (window.mtop && window.mtop.request) {
        mtop.request('mtop.alibaba.jp.guide.page.get', {
          data: { pageCode: '541699' }
        }, (err, data) => {
          if (err) {
            log('请求失败：' + JSON.stringify(err), 'error');
            showResult(err, false);
          } else {
            log('请求成功！', 'success');
            showResult(data);
            updateStatus();
          }
        });
      } else {
        log('mtop.request 不可用', 'error');
      }
    }

    // 测试弹窗检查
    function testPopupCheck() {
      log('调用弹窗检查接口...');
      
      if (window.mtop && window.mtop.request) {
        mtop.request('mtop.jptao.ug.popx.check', {
          data: { activityId: 744 }
        }, (err, data) => {
          if (err) {
            log('请求失败：' + JSON.stringify(err), 'error');
            showResult(err, false);
          } else {
            log('请求成功！', 'success');
            showResult(data);
            updateStatus();
          }
        });
      } else {
        log('mtop.request 不可用', 'error');
      }
    }

    // 测试心愿单
    function testWishlist() {
      log('调用添加心愿单接口...');
      
      if (window.mtop && window.mtop.request) {
        mtop.request('mtop.jp.wishlist.item.add', {
          data: { itemId: '1001006085354675' }
        }, (err, data) => {
          if (err) {
            log('请求失败：' + JSON.stringify(err), 'error');
            showResult(err, false);
          } else {
            log('请求成功！', 'success');
            showResult(data);
            updateStatus();
          }
        });
      } else {
        log('mtop.request 不可用', 'error');
      }
    }

    // 加载商品展示
    function loadProducts() {
      log('加载商品列表...');
      
      if (window.mtop && window.mtop.request) {
        mtop.request('mtop.relationrecommend.tiantaojprecommend.recommend', {}, (err, data) => {
          if (err) {
            log('加载失败：' + JSON.stringify(err), 'error');
            showResult(err, false);
          } else {
            log('加载成功！', 'success');
            showResult(data);
            updateStatus();
            
            // 渲染商品
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            const items = data?.data?.result?.[0]?.mods?.listItems || [];
            
            if (items.length === 0) {
              grid.innerHTML = '<p style="color:#999;text-align:center;width:100%;">暂无商品数据</p>';
              return;
            }
            
            items.forEach(item => {
              const card = document.createElement('div');
              card.className = 'product-card';
              
              const discount = item.prices?.salePrice?.discount || 0;
              const imgUrl = item.image?.imgUrl || 'https://via.placeholder.com/300x400?text=No+Image';
              const title = item.title?.displayTitle || '未知商品';
              const salePrice = item.prices?.salePrice?.formattedPrice || '¥ 0';
              const originalPrice = item.prices?.originalPrice?.formattedPrice || '';
              
              card.innerHTML = `
                <img class="product-image" src="${imgUrl}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x400?text=Load+Failed'"/>
                <div class="product-info">
                  <div class="product-title">${title}</div>
                  <div class="product-price">
                    <span class="price-sale">${salePrice}</span>
                    ${originalPrice ? `<span class="price-original">${originalPrice}</span>` : ''}
                    ${discount > 0 ? `<span class="discount-tag">-${discount}%</span>` : ''}
                  </div>
                </div>
              `;
              
              grid.appendChild(card);
            });
            
            log(`渲染了 ${items.length} 个商品`, 'success');
          }
        });
      } else {
        log('mtop.request 不可用', 'error');
      }
    }

    // 页面加载后更新状态
    setTimeout(() => {
      log('页面加载完成');
      log('检查 Mock 状态...');
      updateStatus();
      
      // 每秒更新一次状态
      setInterval(updateStatus, 1000);
    }, 500);
  </script>
</body>
</html>
