<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>淘宝日本 - 离线 Mock 版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; }
    
    /* 头部 */
    .header { background: linear-gradient(90deg, #ff6b6b, #ff4d4f); color: #fff; padding: 15px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h1 { font-size: 20px; font-weight: 500; }
    .header p { font-size: 12px; opacity: 0.9; margin-top: 5px; }
    
    /* 主容器 */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* 状态卡片 */
    .status-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .status-card h2 { font-size: 16px; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    /* 状态网格 */
    .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .status-item { background: #fafafa; padding: 15px; border-radius: 6px; border-left: 3px solid #ddd; }
    .status-item.ok { border-left-color: #52c41a; background: #f6ffed; }
    .status-item.error { border-left-color: #ff4d4f; background: #fff2f0; }
    .status-item label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
    .status-item .value { font-size: 18px; font-weight: 600; color: #333; }
    
    /* 商品网格 */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
    .product-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .product-image { width: 100%; height: 220px; object-fit: cover; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; align-items: center; justify-content: center; color: #999; font-size: 40px; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { padding: 15px; }
    .product-title { font-size: 14px; color: #333; margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .price-sale { font-size: 20px; font-weight: 700; color: #ff4d4f; }
    .price-original { font-size: 13px; color: #999; text-decoration: line-through; }
    .discount-tag { background: linear-gradient(90deg, #ff6b6b, #ff4d4f); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .sales-tag { background: #f0f0f0; color: #666; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    
    /* 按钮 */
    .btn { background: #1890ff; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; margin-right: 10px; margin-bottom: 10px; transition: all 0.2s; }
    .btn:hover { background: #40a9ff; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.success { background: #52c41a; }
    .btn.success:hover { background: #73d13d; }
    .btn.warning { background: #faad14; }
    .btn.warning:hover { background: #ffc53d; }
    
    /* 日志区域 */
    .log-area { background: #001529; color: #52c41a; padding: 15px; border-radius: 6px; font-family: "Monaco", "Consolas", monospace; font-size: 12px; max-height: 250px; overflow: auto; line-height: 1.6; }
    .log-entry { margin-bottom: 5px; }
    .log-entry.error { color: #ff4d4f; }
    .log-entry.warn { color: #faad14; }
    
    /* API 列表 */
    .api-list { list-style: none; }
    .api-list li { padding: 8px 12px; background: #fafafa; margin-bottom: 8px; border-radius: 4px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .api-list li:before { content: "📡"; }
    
    /* 标签页 */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e8e8e8; padding-bottom: 10px; }
    .tab { padding: 8px 16px; background: #f0f0f0; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all 0.2s; }
    .tab:hover { background: #e8e8e8; }
    .tab.active { background: #1890ff; color: #fff; }
    
    /* 隐藏/显示 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* 加载动画 */
    .loading { text-align: center; padding: 40px; color: #999; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #1890ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- 头部 -->
  <div class="header">
    <h1>🛍️ 淘宝日本 - 分类页面</h1>
    <p>离线 Mock 版 - 不依赖任何 CDN 资源</p>
  </div>
  
  <!-- 主容器 -->
  <div class="container">
    <!-- 标签页 -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('products')">🛍️ 商品列表</div>
      <div class="tab" onclick="switchTab('status')">📊 系统状态</div>
      <div class="tab" onclick="switchTab('logs')">📝 请求日志</div>
    </div>
    
    <!-- 商品列表 -->
    <div id="tab-products" class="tab-content active">
      <div class="status-card">
        <h2>🎯 操作</h2>
        <button class="btn" onclick="loadProducts()">🔄 加载商品</button>
        <button class="btn success" onclick="testMock()">🧪 测试 Mock</button>
        <button class="btn warning" onclick="clearLogs()">🗑️ 清空日志</button>
      </div>
      
      <div class="status-card">
        <h2>🛍️ 推荐商品</h2>
        <div class="product-grid" id="product-grid">
          <div class="loading">
            <div class="loading-spinner"></div>
            <p>点击"加载商品"按钮开始</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 系统状态 -->
    <div id="tab-status" class="tab-content">
      <div class="status-card">
        <h2>📊 Mock 状态</h2>
        <div class="status-grid" id="status-grid">
          <div class="status-item">
            <label>Mock 拦截器</label>
            <div class="value" id="mock-enabled">检测中...</div>
          </div>
          <div class="status-item">
            <label>拦截次数</label>
            <div class="value" id="intercept-count">0</div>
          </div>
          <div class="status-item">
            <label>已配置 API</label>
            <div class="value" id="api-count">0</div>
          </div>
          <div class="status-item">
            <label>最后拦截</label>
            <div class="value" id="last-api">-</div>
          </div>
        </div>
      </div>
      
      <div class="status-card">
        <h2>📡 已配置 API</h2>
        <ul class="api-list" id="api-list"></ul>
      </div>
    </div>
    
    <!-- 请求日志 -->
    <div id="tab-logs" class="tab-content">
      <div class="status-card">
        <h2>📝 请求日志</h2>
        <div class="log-area" id="log-area">
          <div class="log-entry">等待请求...</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // ==================== Mock 数据 ====================
    const MOCK_DATA = {
      'mtop.relationrecommend.tiantaojprecommend.recommend': {
        ret: ['SUCCESS::调用成功'],
        v: '1.0',
        traceId: 'mock_' + Date.now(),
        data: {
          result: [{
            layoutInfo: { listHeader: ['rcmdTitle'] },
            mods: {
              listItems: [
                {
                  image: { imgUrl: 'https://pic-cdn-jp.tao-media.co/kf/S23c00cde0a4649579fe0d5a39a401533o.jpg', imgType: '3:4' },
                  itemType: 'rmdproductV3',
                  productId: '1001006085354675',
                  title: { displayTitle: '極上の柔らかさのランニングパンツ【夏用・薄手・通気性・ゆったりフィット】', rowNum: 1 },
                  prices: {
                    originalPrice: { formattedPrice: '¥ 3,712', minPrice: 3712, currencyCode: 'JPY' },
                    salePrice: { formattedPrice: '¥ 2,341', minPrice: 2341, discount: 36, currencyCode: 'JPY' }
                  },
                  sales: 1234
                },
                {
                  image: { imgUrl: 'https://pic-cdn-jp.tao-media.co/kf/S68032c6541fe46a4aa47fd1cdf913443A.jpg', imgType: '3:4' },
                  itemType: 'rmdproductV3',
                  productId: '1001006091442084',
                  title: { displayTitle: 'ベッドサイドテーブル 可動式 昇降式 パソコンデスク 学生用デスク 寝室 家庭用 学習 シンプル', rowNum: 1 },
                  prices: {
                    originalPrice: { formattedPrice: '¥ 2,614', minPrice: 2614, currencyCode: 'JPY' },
                    salePrice: { formattedPrice: '¥ 1,353', minPrice: 1353, discount: 48, currencyCode: 'JPY' }
                  },
                  sales: 527
                },
                {
                  image: { imgUrl: 'https://pic-cdn-jp.tao-media.co/kf/S6cbbb9b6599244bca03b130e8046d7a9I.jpg', imgType: '3:4' },
                  itemType: 'rmdproductV3',
                  productId: '1001006097071520',
                  title: { displayTitle: 'VICTOR バドミントンシューズ【安定性・クッション性・男女兼用・ワイドラスト】', rowNum: 1 },
                  prices: {
                    originalPrice: { formattedPrice: '¥ 25,276', minPrice: 25276, currencyCode: 'JPY' },
                    salePrice: { formattedPrice: '¥ 24,276', minPrice: 24276, discount: 4, currencyCode: 'JPY' }
                  },
                  sales: 69
                },
                {
                  image: { imgUrl: 'https://pic-cdn-jp.tao-media.co/kf/S3737e86e14af4e2ca9732540de0eefe5k.jpg', imgType: '3:4' },
                  itemType: 'rmdproductV3',
                  productId: '1001006087723485',
                  title: { displayTitle: '学生向けの綿素材製の三点セット【格子柄・上下二段ベッド用・ベッドカバー・枕カバー・シーツ付き】', rowNum: 1 },
                  prices: {
                    originalPrice: { formattedPrice: '¥ 1,054', minPrice: 1054, currencyCode: 'JPY' },
                    salePrice: { formattedPrice: '¥ 406', minPrice: 406, discount: 61, currencyCode: 'JPY' }
                  },
                  sales: 1298
                }
              ]
            }
          }],
          rcmdTitle: { title: 'RECOMMEND' }
        }
      },
      'mtop.alibaba.jp.guide.page.get': {
        ret: ['SUCCESS::调用成功'],
        v: '1.0',
        traceId: 'mock_' + Date.now(),
        data: { pageCode: '541699', pageName: '新分类 - 女性穿搭', cards: [] }
      },
      'mtop.jptao.ug.popx.check': {
        ret: ['SUCCESS::调用成功'],
        v: '1.0',
        data: { result: true, success: true, uuid: 'mock_uuid' }
      },
      'mtop.jptao.ug.popx.list': {
        ret: ['SUCCESS::调用成功'],
        v: '1.0',
        data: { success: true, activities: [], actions: [], traces: [] }
      },
      'mtop.jp.wishlist.item.add': {
        ret: ['SUCCESS::调用成功'],
        v: '1.0',
        data: { result: 'true' }
      },
      'mtop.jp.interaction.execute': {
        ret: ['SUCCESS::调用成功'],
        data: { result: 'true' }
      }
    };
    
    // ==================== Mock 状态 ====================
    window.__MTOP_MOCK_STATUS__ = {
      enabled: true,
      interceptedCount: 0,
      mockedAPIs: Object.keys(MOCK_DATA),
      startTime: Date.now(),
      logs: []
    };
    
    // ==================== 日志函数 ====================
    function addLog(message, type = 'info') {
      const status = window.__MTOP_MOCK_STATUS__;
      status.logs.unshift({ time: new Date().toLocaleTimeString('zh-CN', {hour12:false}), message, type });
      if (status.logs.length > 50) status.logs.pop();
      updateLogs();
      updateStatus();
    }
    
    function updateLogs() {
      const el = document.getElementById('log-area');
      if (!el) return;
      const status = window.__MTOP_MOCK_STATUS__;
      el.innerHTML = status.logs.map(log => 
        `<div class="log-entry ${log.type === 'error' ? 'error' : log.type === 'warn' ? 'warn' : ''}">[${log.time}] ${log.message}</div>`
      ).join('');
    }
    
    function clearLogs() {
      window.__MTOP_MOCK_STATUS__.logs = [];
      updateLogs();
      addLog('日志已清空', 'warn');
    }
    
    // ==================== 状态更新 ====================
    function updateStatus() {
      const s = window.__MTOP_MOCK_STATUS__;
      if (!s) return;
      
      const enabledEl = document.getElementById('mock-enabled');
      const countEl = document.getElementById('intercept-count');
      const apiEl = document.getElementById('api-count');
      const lastEl = document.getElementById('last-api');
      const apiListEl = document.getElementById('api-list');
      
      if (enabledEl) {
        enabledEl.textContent = s.enabled ? '✅ 已激活' : '❌ 未激活';
        enabledEl.parentElement.className = 'status-item ' + (s.enabled ? 'ok' : 'error');
      }
      if (countEl) countEl.textContent = s.interceptedCount;
      if (apiEl) apiEl.textContent = s.mockedAPIs.length;
      if (lastEl) lastEl.textContent = s.lastAPI || '-';
      
      if (apiListEl) {
        apiListEl.innerHTML = s.mockedAPIs.map(api => `<li>${api}</li>`).join('');
      }
    }
    
    // ==================== 标签页切换 ====================
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById('tab-' + tabName).classList.add('active');
    }
    
    // ==================== Mock 拦截器 ====================
    // 模拟 mtop 对象
    window.mtop = {
      version: '2.7.2-mock',
      request: function(api, params, callback) {
        const apiName = typeof api === 'object' ? api.api : api;
        const cb = typeof api === 'object' ? params : callback;
        
        console.log('[MTOP Mock] 拦截请求:', apiName);
        addLog(`📡 请求：${apiName}`);
        
        const status = window.__MTOP_MOCK_STATUS__;
        
        if (MOCK_DATA[apiName]) {
          status.interceptedCount++;
          status.lastAPI = apiName;
          addLog(`✅ Mock 命中：${apiName}`, 'info');
          
          setTimeout(() => {
            const mockResponse = MOCK_DATA[apiName];
            if (typeof cb === 'function') cb(null, mockResponse);
            window.dispatchEvent(new CustomEvent('mtop-mock-response', { detail: { api: apiName, data: mockResponse } }));
          }, 100 + Math.random() * 200);
          
          return Promise.resolve(MOCK_DATA[apiName]);
        } else {
          status.interceptedCount++;
          addLog(`⚠️ 未配置 Mock: ${apiName}`, 'warn');
          
          const fallbackResponse = {
            ret: ['SUCCESS::Mock Fallback'],
            v: '1.0',
            data: {}
          };
          
          setTimeout(() => {
            if (typeof cb === 'function') cb(null, fallbackResponse);
          }, 100);
          
          return Promise.resolve(fallbackResponse);
        }
      }
    };
    
    // ==================== 功能函数 ====================
    function loadProducts() {
      addLog('🔄 加载商品列表...');
      
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div>';
      
      window.mtop.request('mtop.relationrecommend.tiantaojprecommend.recommend', {}, (err, data) => {
        if (err) {
          addLog('❌ 加载失败：' + JSON.stringify(err), 'error');
          grid.innerHTML = '<div class="loading">❌ 加载失败<br>' + err.message + '</div>';
          return;
        }
        
        addLog('✅ 加载成功', 'success');
        
        const items = data?.data?.result?.[0]?.mods?.listItems || [];
        
        if (items.length === 0) {
          grid.innerHTML = '<div class="loading">📭 暂无商品</div>';
          return;
        }
        
        grid.innerHTML = items.map(item => {
          const discount = item.prices?.salePrice?.discount || 0;
          const imgUrl = item.image?.imgUrl || '';
          const title = item.title?.displayTitle || '未知商品';
          const salePrice = item.prices?.salePrice?.formattedPrice || '¥ 0';
          const originalPrice = item.prices?.originalPrice?.formattedPrice || '';
          const sales = item.sales || 0;
          
          return `
            <div class="product-card" onclick="viewProduct('${item.productId}')">
              <div class="product-image">
                ${imgUrl ? `<img src="${imgUrl}" alt="${title}" onerror="this.parentElement.innerHTML='🖼️'"/>` : '🖼️'}
              </div>
              <div class="product-info">
                <div class="product-title">${title}</div>
                <div class="product-price">
                  <span class="price-sale">${salePrice}</span>
                  ${originalPrice ? `<span class="price-original">${originalPrice}</span>` : ''}
                  ${discount > 0 ? `<span class="discount-tag">-${discount}%</span>` : ''}
                  ${sales > 0 ? `<span class="sales-tag">已售${sales}</span>` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        addLog(`📦 渲染了 ${items.length} 个商品`, 'success');
      });
    }
    
    function testMock() {
      addLog('🧪 测试 Mock 功能...');
      
      window.mtop.request('mtop.relationrecommend.tiantaojprecommend.recommend', {}, (err, data) => {
        if (err) {
          addLog('❌ 测试失败：' + JSON.stringify(err), 'error');
          alert('Mock 测试失败！\n\n' + JSON.stringify(err, null, 2));
        } else {
          const count = data?.data?.result?.[0]?.mods?.listItems?.length || 0;
          addLog(`✅ 测试成功！收到 ${count} 个商品`, 'success');
          alert(`✅ Mock 工作正常！\n\n收到 ${count} 个商品数据`);
        }
        updateStatus();
      });
    }
    
    function viewProduct(productId) {
      addLog('👁️ 查看商品：' + productId);
      alert('商品 ID: ' + productId + '\n\n（演示功能 - 实际项目中会跳转到商品详情页）');
    }
    
    // ==================== 初始化 ====================
    window.addEventListener('load', () => {
      addLog('🚀 页面加载完成', 'success');
      updateStatus();
      updateLogs();
      
      // 自动加载商品
      setTimeout(() => {
        loadProducts();
      }, 500);
    });
    
    // 监听 mock 事件
    window.addEventListener('mtop-mock-response', (e) => {
      addLog(`📨 响应：${e.detail.api}`, 'success');
    });
  </script>
</body>
</html>
