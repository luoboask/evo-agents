<!DOCTYPE html>
<html>
<head>
  <meta charSet="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>调试页面 - 诊断问题</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    .section { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .section h2 { margin-top: 0; color: #0af; }
    .ok { color: #52c41a; }
    .error { color: #ff4d4f; }
    .warn { color: #faad14; }
    pre { background: #000; padding: 10px; border-radius: 4px; overflow: auto; max-height: 300px; }
    button { background: #1890ff; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
    button:hover { background: #40a9ff; }
  </style>
</head>
<body>
  <h1>🔍 问题诊断页面</h1>
  
  <div class="section">
    <h2>1. 网络状态</h2>
    <div id="network-status">检测中...</div>
  </div>
  
  <div class="section">
    <h2>2. CDN 资源加载</h2>
    <div id="cdn-status">检测中...</div>
  </div>
  
  <div class="section">
    <h2>3. JavaScript 环境</h2>
    <div id="js-status">检测中...</div>
  </div>
  
  <div class="section">
    <h2>4. 错误日志</h2>
    <pre id="error-log">等待错误...</pre>
  </div>
  
  <div class="section">
    <h2>5. 测试操作</h2>
    <button onclick="checkAll()">🔄 重新检查</button>
    <button onclick="testMtop()">🧪 测试 mtop</button>
    <button onclick="loadCDNResource()">📦 测试 CDN 加载</button>
  </div>
  
  <script>
    const errors = [];
    
    // 捕获全局错误
    window.onerror = function(msg, url, line, col, error) {
      const errorInfo = {
        message: msg,
        url: url,
        line: line,
        col: col,
        stack: error ? error.stack : 'N/A'
      };
      errors.push(errorInfo);
      updateErrorLog();
      return false;
    };
    
    // 捕获未处理的 Promise 拒绝
    window.onunhandledrejection = function(event) {
      errors.push({
        message: 'Unhandled Promise Rejection',
        reason: event.reason
      });
      updateErrorLog();
    };
    
    function updateErrorLog() {
      const el = document.getElementById('error-log');
      if (el) {
        el.textContent = errors.length > 0 
          ? errors.map((e, i) => `[${i+1}] ${e.message}\n    at ${e.url || 'unknown'}:${e.line || '?'}:${e.col || '?'}\n${e.stack || ''}`).join('\n\n')
          : '✅ 没有错误';
      }
    }
    
    function log(msg, type = 'info') {
      const prefix = type === 'error' ? '❌' : type === 'ok' ? '✅' : '📝';
      errors.push({ message: `${prefix} ${msg}` });
      updateErrorLog();
    }
    
    async function checkNetwork() {
      const el = document.getElementById('network-status');
      try {
        const response = await fetch('https://g.alicdn.com/', { method: 'HEAD', mode: 'no-cors' });
        el.innerHTML = '<span class="ok">✅ 网络正常 - 可以访问 CDN</span>';
        log('网络检查通过', 'ok');
      } catch (e) {
        el.innerHTML = '<span class="error">❌ 网络异常 - 无法访问 CDN</span><br>' + e.message;
        log('网络检查失败：' + e.message, 'error');
      }
    }
    
    async function checkCDN() {
      const el = document.getElementById('cdn-status');
      const resources = [
        'https://g.alicdn.com/mtb/lib-mtop/2.7.2/mtop.js',
        'https://g.alicdn.com/code/lib/react/18.3.1/umd/react.production.min.js',
        'https://g.alicdn.com/jp-fe/jp-new-homepage-category-page/0.0.41/js/main.js'
      ];
      
      let html = '<ul>';
      for (const url of resources) {
        try {
          const response = await fetch(url, { method: 'HEAD', mode: 'no-cors' });
          html += `<li class="ok">✅ ${url.split('/').slice(-2).join('/')}</li>`;
          log('CDN 资源可访问：' + url, 'ok');
        } catch (e) {
          html += `<li class="error">❌ ${url.split('/').slice(-2).join('/')} - ${e.message}</li>`;
          log('CDN 资源不可访问：' + url, 'error');
        }
      }
      html += '</ul>';
      el.innerHTML = html;
    }
    
    function checkJS() {
      const el = document.getElementById('js-status');
      const checks = [];
      
      // 检查 React
      checks.push({
        name: 'React',
        ok: typeof React !== 'undefined',
        version: typeof React !== 'undefined' ? React.version : 'N/A'
      });
      
      // 检查 ReactDOM
      checks.push({
        name: 'ReactDOM',
        ok: typeof ReactDOM !== 'undefined',
        version: typeof ReactDOM !== 'undefined' ? ReactDOM.version : 'N/A'
      });
      
      // 检查 mtop
      checks.push({
        name: 'mtop',
        ok: typeof window.mtop !== 'undefined',
        version: typeof window.mtop !== 'undefined' ? (window.mtop.version || 'unknown') : 'N/A'
      });
      
      // 检查 Mock 状态
      checks.push({
        name: 'MTOP Mock',
        ok: typeof window.__MTOP_MOCK_STATUS__ !== 'undefined',
        version: window.__MTOP_MOCK_STATUS__ ? '已激活' : '未激活'
      });
      
      let html = '<ul>';
      checks.forEach(check => {
        const status = check.ok ? '<span class="ok">✅</span>' : '<span class="error">❌</span>';
        html += `<li>${status} <strong>${check.name}:</strong> ${check.version}</li>`;
      });
      html += '</ul>';
      el.innerHTML = html;
      
      log(`JS 环境检查完成 - ${checks.filter(c => c.ok).length}/${checks.length} 通过`, 'ok');
    }
    
    function checkAll() {
      log('开始全面检查...');
      checkNetwork();
      checkCDN();
      checkJS();
    }
    
    function testMtop() {
      log('测试 mtop.request...');
      
      if (!window.mtop || !window.mtop.request) {
        log('❌ mtop.request 不可用', 'error');
        alert('mtop 不可用！请检查 mtop.js 是否加载成功');
        return;
      }
      
      log('调用 mock API...');
      mtop.request('mtop.relationrecommend.tiantaojprecommend.recommend', {}, (err, data) => {
        if (err) {
          log('❌ 请求失败：' + JSON.stringify(err), 'error');
          alert('请求失败：' + JSON.stringify(err));
        } else {
          log('✅ 请求成功！', 'ok');
          alert('Mock 成功！\n\n' + JSON.stringify(data, null, 2).slice(0, 500) + '...');
        }
        checkJS();
      });
    }
    
    function loadCDNResource() {
      log('测试动态加载 CDN 资源...');
      
      const script = document.createElement('script');
      script.src = 'https://g.alicdn.com/mtb/lib-mtop/2.7.2/mtop.js';
      script.onload = () => {
        log('✅ mtop.js 加载成功', 'ok');
        checkJS();
      };
      script.onerror = () => {
        log('❌ mtop.js 加载失败', 'error');
        alert('CDN 资源加载失败！可能是网络问题或 CDN 不可用');
      };
      document.head.appendChild(script);
    }
    
    // 页面加载后自动检查
    window.addEventListener('load', () => {
      log('页面加载完成');
      setTimeout(checkAll, 500);
    });
    
    // 初始检查
    checkAll();
  </script>
</body>
</html>
