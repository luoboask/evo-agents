<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 宠物模拟器</title>
  <style>
    :root {
      --primary: #ff9ff3;
      --secondary: #feca57;
      --accent: #54a0ff;
      --bg-dark: #1a1a2e;
      --bg-card: rgba(30, 30, 50, 0.9);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: #a0a0b0;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }
    
    .bg-stars {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
      z-index: -2;
    }
    
    .bg-particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.5;
    }
    
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.2;
      animation: float 20s linear infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0; }
      10%, 90% { opacity: 0.3; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 20px 0;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .game-area {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
    }
    
    @media (max-width: 900px) {
      .game-area { grid-template-columns: 1fr; }
    }
    
    .pet-stage {
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 30px;
    }
    
    .pet-container {
      width: 100%;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .scene-bg {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(180deg, transparent 0%, rgba(100, 100, 150, 0.15) 100%);
    }
    
    .pet-house {
      position: absolute;
      bottom: 15px; left: 20px;
      width: 80px; height: 60px;
      background: linear-gradient(135deg, rgba(255, 159, 243, 0.15), rgba(254, 202, 87, 0.1));
      border: 2px solid rgba(255, 159, 243, 0.3);
      border-radius: 12px 12px 6px 6px;
    }
    
    .pet-house::before {
      content: '🏠';
      position: absolute;
      top: -18px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.3rem;
    }
    
    .toy {
      position: absolute;
      font-size: 1.2rem;
      animation: toyFloat 3s ease-in-out infinite;
    }
    
    .toy-1 { bottom: 20px; right: 40px; }
    .toy-2 { bottom: 40px; right: 80px; animation-delay: 1s; }
    
    @keyframes toyFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }
    
    .pet {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 10;
      width: 200px; height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s ease;
    }
    
    .pet-emoji {
      font-size: 140px;
      filter: drop-shadow(0 0 30px rgba(255, 159, 243, 0.4));
      animation: breathe 4s ease-in-out infinite;
      user-select: none;
      display: inline-block;
      transition: all 0.5s ease;
    }
    
    /* 心情状态效果 */
    .pet.happy .pet-emoji {
      filter: drop-shadow(0 0 40px rgba(0, 255, 136, 0.6));
      animation: happyBounce 2s ease-in-out infinite;
    }
    
    @keyframes happyBounce {
      0%, 100% { transform: scale(1.05) translateY(0); }
      50% { transform: scale(1.08) translateY(-8px); }
    }
    
    .pet.tired .pet-emoji {
      filter: drop-shadow(0 0 20px rgba(160, 160, 176, 0.4));
      animation: tiredBreath 5s ease-in-out infinite;
    }
    
    @keyframes tiredBreath {
      0%, 100% { transform: scale(0.95); }
      50% { transform: scale(0.98); }
    }
    
    .pet.sad .pet-emoji {
      filter: drop-shadow(0 0 25px rgba(84, 160, 255, 0.5));
      animation: sadSway 3s ease-in-out infinite;
    }
    
    @keyframes sadSway {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    
    /* 进化特效 */
    .pet.evolving .pet-emoji {
      animation: evolveGlow 1s ease infinite;
    }
    
    @keyframes evolveGlow {
      0%, 100% { filter: drop-shadow(0 0 30px gold) scale(1); }
      50% { filter: drop-shadow(0 0 60px gold) scale(1.1); }
    }
    
    /* 等级光环 */
    .pet-level-ring {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(255, 159, 243, 0.4);
    }
    
    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.03) translateY(-5px); }
    }
    
    .pet.anim-feed { animation: feedAnim 0.3s ease; }
    @keyframes feedAnim {
      0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      50% { transform: translate(-50%, -50%) scale(1.1) rotate(-10deg); }
    }
    
    .pet.anim-play { animation: playAnim 0.25s ease; }
    @keyframes playAnim {
      0%, 100% { transform: translate(-50%, -50%) scale(1) translateY(0); }
      50% { transform: translate(-50%, -50%) scale(1.15) translateY(-20px); }
    }
    
    .pet.idle { 
      animation: idleAnim 3s ease-in-out infinite;
      transform: translate(-50%, -50%);
    }
    @keyframes idleAnim {
      0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(0deg); }
      25% { transform: translate(-50%, -50%) translateY(-3px) rotate(2deg); }
      75% { transform: translate(-50%, -50%) translateY(3px) rotate(-2deg); }
    }
    
    /* 添加宠物动作特效 */
    .pet-effect {
      position: absolute;
      font-size: 2rem;
      pointer-events: none;
      animation: effectFloat 1s ease forwards;
      z-index: 100;
    }
    
    @keyframes effectFloat {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
    }
    
    .status-bubble {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: opacity 0.2s ease;
    }
    
    .pet-info { margin-top: 20px; }
    
    .pet-name {
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .pet-level {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
    }
    
    .exp-bar-container { margin-bottom: 14px; }
    
    .exp-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .stat-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .stat-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    
    .stat-item {
      text-align: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .intimacy-bar { margin-top: 14px; }
    
    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    
    .action-btn {
      padding: 12px 8px;
      border: none;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 2px solid var(--border);
    }
    
    .action-btn .emoji { font-size: 1.5rem; }
    
    .action-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.1);
    }
    
    .action-btn.feed { border-color: #ff6b6b; }
    .action-btn.feed:hover { background: rgba(255, 107, 107, 0.2); }
    
    .action-btn.play { border-color: #feca57; }
    .action-btn.play:hover { background: rgba(254, 202, 87, 0.2); }
    
    .action-btn.clean { border-color: #54a0ff; }
    .action-btn.clean:hover { background: rgba(84, 160, 255, 0.2); }
    
    .action-btn.rest { border-color: #5f27cd; }
    .action-btn.rest:hover { background: rgba(95, 39, 205, 0.2); }
    
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    
    .panel-card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 16px;
      border: 1px solid var(--border);
    }
    
    .panel-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .log-container {
      max-height: 140px;
      overflow-y: auto;
      font-size: 0.8rem;
      line-height: 1.8;
    }
    
    .log-container::-webkit-scrollbar { width: 5px; }
    .log-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 3px; }
    .log-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: var(--text-muted); font-size: 0.7rem; margin-right: 6px; }
    
    .quest-list { display: flex; flex-direction: column; gap: 8px; }
    
    .quest-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }
    
    .quest-name { font-weight: 600; margin-bottom: 3px; font-size: 0.85rem; }
    .quest-progress { font-size: 0.75rem; color: var(--text-muted); }
    
    .quest-progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .quest-progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    
    .shop-grid { display: flex; flex-direction: column; gap: 6px; }
    
    .shop-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .shop-item:hover { background: rgba(255, 255, 255, 0.1); }
    
    .shop-item-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .shop-item-icon { font-size: 1.3rem; }
    .shop-item-price { color: #feca57; font-weight: 700; font-size: 0.85rem; }
    
    .adventure-popup {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 50, 0.98);
      border: 2px solid;
      border-radius: 14px;
      padding: 16px 24px;
      z-index: 1000;
      animation: slideUpFade 0.4s ease forwards;
      min-width: 280px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    
    @keyframes slideUpFade {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    @keyframes slideDownFade {
      from { transform: translateX(-50%) translateY(0); opacity: 1; }
      to { transform: translateX(-50%) translateY(20px); opacity: 0; }
    }
    
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      border: 1px solid var(--border);
      text-align: center;
    }
    
    .modal h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .pet-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    
    .pet-option {
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid var(--border);
    }
    
    .pet-option:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.1);
    }
    
    .pet-option.selected {
      border-color: var(--primary);
      background: rgba(255, 159, 243, 0.15);
    }
    
    .pet-option .emoji { font-size: 2.5rem; margin-bottom: 6px; }
    .pet-option .name { font-weight: 600; margin-bottom: 3px; }
    .pet-option .desc { font-size: 0.75rem; color: var(--text-muted); }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 6px; font-weight: 600; }
    
    .input-group input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 159, 243, 0.1);
    }
    
    .btn-start {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 159, 243, 0.4);
    }
    
    .offline-rewards {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-card);
      border-radius: 18px;
      padding: 32px;
      text-align: center;
      z-index: 1500;
      border: 2px solid var(--secondary);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    .offline-rewards h2 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      color: var(--secondary);
    }
    
    .rewards-list { margin: 16px 0; font-size: 1rem; }
    .reward-item {
      padding: 8px;
      margin: 8px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="bg-stars"></div>
  <div class="bg-particles" id="particles"></div>
  
  <!-- 创建宠物弹窗 -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h2>🥚 孵化宠物</h2>
      <p style="color: var(--text-muted); margin-bottom: 20px;">选择一只宠物开始养成</p>
      
      <div class="pet-options">
        <div class="pet-option selected" data-type="dragon">
          <div class="emoji">🐉</div>
          <div class="name">小龙</div>
          <div class="desc">强大独立</div>
        </div>
        <div class="pet-option" data-type="cat">
          <div class="emoji">🐱</div>
          <div class="name">小猫</div>
          <div class="desc">可爱粘人</div>
        </div>
        <div class="pet-option" data-type="robot">
          <div class="emoji">🤖</div>
          <div class="name">机器人</div>
          <div class="desc">聪明理性</div>
        </div>
      </div>
      
      <div class="input-group">
        <label>宠物名字</label>
        <input type="text" id="petNameInput" placeholder="例如：小白、豆豆..." maxlength="12" value="小宠物">
      </div>
      
      <button class="btn-start" onclick="createPet()">🚀 开始孵化</button>
    </div>
  </div>
  
  <div class="container">
    <header>
      <h1>🐾 AI 宠物模拟器</h1>
      <p class="subtitle">轻松放置 · 温馨养成</p>
    </header>
    
    <div class="game-area">
      <!-- 左侧：宠物 + 互动 + 任务 -->
      <div class="sidebar">
        <!-- 宠物展示区 -->
        <div class="pet-stage">
          <div class="pet-container" id="petContainer">
            <div class="scene-bg"></div>
            <div class="pet-house"></div>
            <div class="toy toy-1">🎾</div>
            <div class="toy toy-2">🧸</div>
            
            <div class="pet" id="pet">
              <div class="pet-emoji" id="petEmoji">🥚</div>
              <div class="pet-level-ring" id="petStageRing">蛋</div>
            </div>
            <div class="status-bubble" id="statusBubble" style="display: none;"></div>
          </div>
          
          <!-- 互动按钮 -->
          <div class="action-grid" style="margin-top: 20px; margin-bottom: 20px;">
            <button class="action-btn feed" onclick="interact('feed')">
              <span class="emoji">🍖</span>
              <span>喂食</span>
            </button>
            <button class="action-btn play" onclick="interact('play')">
              <span class="emoji">🎾</span>
              <span>玩耍</span>
            </button>
            <button class="action-btn clean" onclick="interact('clean')">
              <span class="emoji">🧹</span>
              <span>清洁</span>
            </button>
            <button class="action-btn rest" onclick="interact('rest')">
              <span class="emoji">💤</span>
              <span>休息</span>
            </button>
          </div>
          
          <div class="pet-info">
            <div class="pet-name">
              <span id="petName">未命名</span>
              <span class="pet-level" id="petLevel">Lv.1</span>
            </div>
            
            <div class="exp-bar-container">
              <div class="exp-label">
                <span>⭐ 经验</span>
                <span id="expText">0/100</span>
              </div>
              <div class="stat-bar">
                <div class="stat-fill" id="expBar" style="width: 0%"></div>
              </div>
              <div style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">
                <span id="evoProgress">距离进化：还需 2 级</span>
              </div>
            </div>
            
            <div class="stats-grid">
              <div class="stat-item">
                <div class="stat-label">💖 心情</div>
                <div class="stat-value" id="happinessValue">100</div>
                <div class="stat-bar" style="margin-top: 6px;">
                  <div class="stat-fill" id="happinessBar" style="width: 100%"></div>
                </div>
              </div>
              
              <div class="stat-item">
                <div class="stat-label">🍖 饱食</div>
                <div class="stat-value" id="hungerValue">100</div>
                <div class="stat-bar" style="margin-top: 6px;">
                  <div class="stat-fill" id="hungerBar" style="width: 100%"></div>
                </div>
              </div>
              
              <div class="stat-item">
                <div class="stat-label">⚡ 能量</div>
                <div class="stat-value" id="energyValue">100</div>
                <div class="stat-bar" style="margin-top: 6px;">
                  <div class="stat-fill" id="energyBar" style="width: 100%"></div>
                </div>
              </div>
            </div>
            
            <div class="intimacy-bar">
              <div class="exp-label">
                <span>💕 亲密度</span>
                <span id="intimacyText">0/100</span>
              </div>
              <div class="stat-bar">
                <div class="stat-fill" id="intimacyBar" style="width: 0%; background: linear-gradient(90deg, #ff9ff3, #feca57);"></div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 日常任务 -->
        <div class="panel-card">
          <h3><span>📋</span> 每日任务</h3>
          <div class="quest-list" id="questList"></div>
        </div>
      </div>
      
      <!-- 右侧：信息面板 -->
      <div class="sidebar">
        <!-- 金币显示 -->
        <div class="panel-card">
          <h3><span>💰</span> 金币</h3>
          <div style="font-size: 1.8rem; font-weight: 700; color: #feca57; text-align: center;">
            <span id="coinDisplay">0</span> 💰
          </div>
          <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 6px; text-align: center;">
            互动可获得金币
          </p>
        </div>
        
        <!-- 商店 -->
        <div class="panel-card">
          <h3><span>🏪</span> 商店</h3>
          <div class="shop-grid" id="shopGrid"></div>
        </div>
        
        <!-- 活动日志 -->
        <div class="panel-card">
          <h3><span>📜</span> 活动日志</h3>
          <div class="log-container" id="logContainer">
            <div class="log-entry">
              <span class="log-time">等待孵化...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // ========== 游戏数据 ==========
    const PET_DATA = {
      dragon: {
        name: '小龙',
        emojis: ['🥚', '🐣', '🐉', '🐲'],
        stages: ['蛋', '幼龙', '成龙', '龙王'],
        growthRate: 1.2,
        colors: ['#ff9ff3', '#feca57', '#ff6b6b', '#54a0ff']
      },
      cat: {
        name: '小猫',
        emojis: ['🥚', '🐱', '🐈', '🦁'],
        stages: ['蛋', '小猫', '成猫', '猫王'],
        growthRate: 1.0,
        colors: ['#feca57', '#ff9ff3', '#ff6b6b', '#54a0ff']
      },
      robot: {
        name: '机器人',
        emojis: ['🥚', '🤖', '👨‍🚀', '🛰️'],
        stages: ['蛋', '初级', '高级', '量子'],
        growthRate: 1.5,
        colors: ['#54a0ff', '#5f27cd', '#ff9ff3', '#feca57']
      }
    };
    
    // 宠物心情状态（影响外观）
    const MOOD_EFFECTS = {
      happy: { glow: '#00ff88', scale: 1.05, desc: '开心' },
      normal: { glow: '#ff9ff3', scale: 1, desc: '普通' },
      tired: { glow: '#a0a0b0', scale: 0.95, desc: '疲惫' },
      sad: { glow: '#54a0ff', scale: 0.95, desc: '难过' }
    };
    
    const DAILY_QUESTS = [
      { id: 'feed', name: '喂食', target: 3, reward: 50, icon: '🍖' },
      { id: 'play', name: '玩耍', target: 2, reward: 30, icon: '🎾' },
      { id: 'clean', name: '清洁', target: 1, reward: 40, icon: '🧹' }
    ];
    
    // 成就系统
    const ACHIEVEMENTS = [
      { id: 'reach_level_5', name: '初出茅庐', desc: '达到 Lv.5', icon: '⭐', reward: 200 },
      { id: 'reach_level_10', name: '小有所成', desc: '达到 Lv.10', icon: '🌟', reward: 500 },
      { id: 'first_evolution', name: '初次进化', desc: '宠物进化', icon: '🧬', reward: 300 },
      { id: 'max_intimacy', name: '亲密无间', desc: '亲密度满', icon: '💕', reward: 200 }
    ];
    
    const SHOP_ITEMS = [
      { id: 'toy_ball', name: '彩球', icon: '🎾', price: 50, effect: '心情 +10' },
      { id: 'treat', name: '零食', icon: '🍪', price: 30, effect: '饱食 +20' },
      { id: 'bed', name: '软垫', icon: '🛏️', price: 150, effect: '能量恢复 +20%' }
    ];
    
    const ADVENTURES = [
      { name: '发现宝藏', icon: '💎', rarity: 'common', text: '宠物发现了小宝藏！', effects: { coins: 50 } },
      { name: '神秘礼物', icon: '🎁', rarity: 'common', text: '收到神秘礼物！', effects: { happiness: 20 } },
      { name: '幸运时刻', icon: '🍀', rarity: 'uncommon', text: '幸运女神眷顾！', effects: { coins: 100, happiness: 10 } },
      { name: '遇见智者', icon: '🧙', rarity: 'rare', text: '获得智者指点！', effects: { exp: 50 } },
      { name: '远古遗迹', icon: '🏛️', rarity: 'epic', text: '发现远古遗迹！', effects: { coins: 200, exp: 100 } }
    ];
    
    const PET_DIALOGUES = {
      dragon: {
        feed: ['好吃！还要！', '嗷呜～', '谢谢主人！'],
        play: ['好开心！', '再来一次！', '嘿嘿～'],
        clean: ['人家才不需要洗澡...', '好吧好吧...', '干净了！']
      },
      cat: {
        feed: ['喵～好吃', '还要还要～', '呼噜呼噜'],
        play: ['喵呜～', '好有趣！', '主人最好啦'],
        clean: ['喵...不要...', '好吧...', '干净了喵']
      },
      robot: {
        feed: ['能量补充中...', '感谢', '系统正常'],
        play: ['娱乐模式启动', '有趣', '开心指数上升'],
        clean: ['清洁程序启动', '感谢维护', '系统优化完成']
      }
    };
    
    // ========== 游戏状态 ==========
    let gameState = {
      petType: 'dragon',
      petName: '未命名',
      level: 1,
      exp: 0,
      maxExp: 100,
      happiness: 100,
      hunger: 100,
      energy: 100,
      intimacy: 0,
      coins: 100,
      stage: 1, // 直接从幼年开始
      isSleeping: false,
      createdAt: Date.now(),
      lastSaveTime: Date.now(),
      quests: {},
      achievements: []
    };
    
    let autoSaveInterval;
    let uiUpdateThrottle = 0;
    
    // ========== 初始化 ==========
    function initParticles() {
      const container = document.getElementById('particles');
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        particle.style.background = ['var(--primary)', 'var(--secondary)', 'var(--accent)'][Math.floor(Math.random() * 3)];
        fragment.appendChild(particle);
      }
      container.appendChild(fragment);
    }
    
    // ========== 宠物选择 ==========
    document.querySelectorAll('.pet-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.pet-option').forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        gameState.petType = option.dataset.type;
      });
    });
    
    // ========== 创建宠物 ==========
    function createPet() {
      const nameInput = document.getElementById('petNameInput');
      const name = nameInput.value.trim() || '小宠物';
      gameState.petName = name;
      gameState.createdAt = Date.now();
      gameState.lastSaveTime = Date.now();
      
      document.getElementById('createModal').style.display = 'none';
      document.getElementById('petName').textContent = name;
      
      const petData = PET_DATA[gameState.petType];
      // 直接从幼年形态开始（不再是蛋）
      document.getElementById('petEmoji').textContent = petData.emojis[1];
      gameState.stage = 1; // 直接是幼年
      gameState.level = 1;
      gameState.exp = 0;
      gameState.maxExp = 100;
      
      addLog(`🎉 ${name} 孵化成功！`);
      
      updateUI();
      initQuests();
      initShop();
      startGame();
    }
    
    // ========== 游戏循环 ==========
    function startGame() {
      autoSaveInterval = setInterval(saveGame, 300000);
      
      let lastUpdate = 0;
      function gameFrame(timestamp) {
        if (timestamp - lastUpdate >= 10000) {
          gameLoop();
          lastUpdate = timestamp;
        }
        requestAnimationFrame(gameFrame);
      }
      requestAnimationFrame(gameFrame);
      
      startPetBehavior();
    }
    
    function gameLoop() {
      if (gameState.isSleeping) {
        gameState.energy = Math.min(100, gameState.energy + 2); // 加快恢复
        if (gameState.energy >= 100) wakeUp();
      } else {
        gameState.hunger = Math.max(0, gameState.hunger - 0.05); // 减慢衰减
        gameState.energy = Math.max(0, gameState.energy - 0.03); // 减慢衰减
        
        if (gameState.hunger < 30 || gameState.energy < 30) {
          gameState.happiness = Math.max(0, gameState.happiness - 0.1);
        }
        
        // 加快经验获取（之前 0.5）
        const expGain = 0.5 + (gameState.level * 0.05); // 等级越高越快
        gameState.exp += expGain;
        checkLevelUp();
      }
      
      if (!gameState.isSleeping && Math.random() < 0.03) {
        triggerAdventure();
      }
      
      updateUI();
    }
    
    // ========== 互动系统 ==========
    function interact(action) {
      if (gameState.isSleeping && action !== 'rest') {
        addLog('😴 宠物正在休息...');
        return;
      }
      
      const pet = document.getElementById('pet');
      const petRect = pet.getBoundingClientRect();
      const containerRect = document.getElementById('petContainer').getBoundingClientRect();
      const centerX = containerRect.width / 2;
      const centerY = containerRect.height / 2;
      
      pet.classList.remove('anim-feed', 'anim-play');
      void pet.offsetWidth;
      
      const petData = PET_DATA[gameState.petType];
      const dialogues = PET_DIALOGUES[gameState.petType];
      
      const coinReward = Math.floor(Math.random() * 3) + 1;
      gameState.coins += coinReward;
      
      updateQuestProgress(action);
      
      switch (action) {
        case 'feed':
          gameState.hunger = Math.min(100, gameState.hunger + 40); // 增加饱食
          gameState.happiness = Math.min(100, gameState.happiness + 15);
          gameState.energy = Math.max(0, gameState.energy - 2);
          gameState.exp += 5; // 增加经验
          pet.classList.add('anim-feed');
          showStatus(getRandomDialogue(dialogues.feed));
          createEffect('🍖', centerX - 20, centerY - 50);
          createEffect('❤️', centerX + 20, centerY - 30);
          addLog(`🍖 喂食成功！心情 +15 | 经验 +5 | 💰 +${coinReward}`);
          break;
          
        case 'play':
          if (gameState.energy < 10) { // 降低消耗门槛
            addLog('😴 宠物太累了...');
            return;
          }
          gameState.happiness = Math.min(100, gameState.happiness + 35);
          gameState.energy = Math.max(0, gameState.energy - 10);
          gameState.hunger = Math.max(0, gameState.hunger - 3);
          gameState.intimacy = Math.min(100, gameState.intimacy + 3);
          gameState.exp += 8; // 大量经验
          pet.classList.add('anim-play');
          showStatus(getRandomDialogue(dialogues.play));
          createEffect('🎾', centerX - 30, centerY - 40);
          createEffect('✨', centerX + 30, centerY - 40);
          createEffect('💕', centerX, centerY - 60);
          addLog(`🎾 玩耍成功！心情 +35 | 经验 +8 | 💰 +${coinReward}`);
          break;
          
        case 'clean':
          gameState.happiness = Math.min(100, gameState.happiness + 20);
          gameState.exp += 3;
          showStatus(getRandomDialogue(dialogues.clean));
          createEffect('✨', centerX - 20, centerY - 50);
          createEffect('🧹', centerX + 20, centerY - 50);
          addLog(`🧹 清洁成功！心情 +20 | 经验 +3 | 💰 +${coinReward}`);
          break;
          
        case 'rest':
          if (gameState.isSleeping) wakeUp();
          else sleep();
          break;
      }
      
      updateUI();
    }
    
    function getRandomDialogue(dialogues) {
      return dialogues[Math.floor(Math.random() * dialogues.length)];
    }
    
    function sleep() {
      gameState.isSleeping = true;
      document.getElementById('petEmoji').textContent = '💤';
      addLog('💤 宠物去休息了...');
      showStatus('晚安～');
    }
    
    function wakeUp() {
      gameState.isSleeping = false;
      const petData = PET_DATA[gameState.petType];
      document.getElementById('petEmoji').textContent = petData.emojis[gameState.stage + 1] || petData.emojis[1];
      addLog('☀️ 宠物休息好了！');
      showStatus('睡醒了！');
    }
    
    // ========== 宠物行为 ==========
    let petPosition = { x: 0, y: 0 }; // -100 到 100
    let petFacing = 1; // 1=右，-1=左
    
    function startPetBehavior() {
      const pet = document.getElementById('pet');
      
      function changeMood() {
        if (gameState.isSleeping) {
          pet.className = 'pet';
          pet.style.transform = 'translate(-50%, -50%)';
          return;
        }
        
        // 清除所有动画
        pet.className = 'pet';
        void pet.offsetWidth;
        
        // 根据状态选择行为
        const rand = Math.random();
        
        if (gameState.happiness > 80 && rand < 0.3) {
          // 跳跃（30% 概率）
          pet.classList.add('anim-play');
          createEffect('✨', 200 + petPosition.x * 2, 150 + petPosition.y * 2);
          setTimeout(() => {
            pet.className = 'pet idle';
          }, 300);
        } else if (gameState.energy > 70 && rand < 0.7) {
          // 走路（40% 概率）
          walkAround();
        } else {
          // 待机（30% 概率）
          pet.classList.add('idle');
        }
        
        // 15-30 秒后切换（更频繁）
        setTimeout(changeMood, 15000 + Math.random() * 15000);
      }
      
      // 走路函数
      function walkAround() {
        // 随机目标位置（-80 到 80）
        const targetX = (Math.random() - 0.5) * 160;
        const targetY = (Math.random() - 0.5) * 80;
        
        // 设置面向
        if (targetX > petPosition.x) {
          petFacing = 1;
        } else if (targetX < petPosition.x) {
          petFacing = -1;
        }
        
        // 应用位置
        pet.style.transition = 'all 2s ease';
        pet.style.transform = `translate(calc(-50% + ${targetX}px), calc(-50% + ${targetY}px)) scaleX(${petFacing})`;
        
        petPosition = { x: targetX, y: targetY };
        
        // 到达后切回待机
        setTimeout(() => {
          pet.className = 'pet idle';
        }, 2000);
      }
      
      // 初始 idle 动画
      pet.classList.add('idle');
      changeMood();
    }
    
    // 创建特效
    function createEffect(emoji, x, y) {
      const effect = document.createElement('div');
      effect.className = 'pet-effect';
      effect.textContent = emoji;
      effect.style.left = x + 'px';
      effect.style.top = y + 'px';
      document.getElementById('petContainer').appendChild(effect);
      setTimeout(() => effect.remove(), 1000);
    }
    
    // ========== 等级系统 ==========
    function checkLevelUp() {
      if (gameState.exp >= gameState.maxExp) {
        gameState.level++;
        gameState.exp = 0;
        gameState.maxExp = Math.floor(gameState.maxExp * 1.3);
        addLog(`⬆️ 升级了！当前等级：Lv.${gameState.level}`);
        showStatus('升级了！');
        updateUI(); // 立即更新 UI
        checkEvolution();
        checkAchievements();
      }
    }
    
    // 检查成就
    function checkAchievements() {
      ACHIEVEMENTS.forEach(ach => {
        if (!gameState.achievements.includes(ach.id)) {
          let earned = false;
          if (ach.id === 'reach_level_5' && gameState.level >= 5) earned = true;
          if (ach.id === 'reach_level_10' && gameState.level >= 10) earned = true;
          if (ach.id === 'first_evolution' && gameState.stage >= 2) earned = true;
          if (ach.id === 'max_intimacy' && gameState.intimacy >= 100) earned = true;
          
          if (earned) {
            gameState.achievements.push(ach.id);
            gameState.coins += ach.reward;
            addLog(`🏆 成就解锁：${ach.icon} ${ach.name}！获得 ${ach.reward} 金币`);
            showStatus('成就解锁！');
          }
        }
      });
    }
    
    function checkEvolution() {
      console.log('检查进化:', { stage: gameState.stage, level: gameState.level });
      // 修复：直接判断是否达到下一阶段
      if (gameState.stage === 1 && gameState.level >= 3) {
        console.log('进化到阶段 2');
        evolve(2); // 幼年→成年
      } else if (gameState.stage === 2 && gameState.level >= 10) {
        console.log('进化到阶段 3');
        evolve(3); // 成年→终极
      }
    }
      else if (gameState.level >= 3) targetStage = 1;   // 之前 10
      
      if (targetStage > gameState.stage) {
        evolve(targetStage);
      }
    }
    
    function evolve(stage) {
      gameState.stage = stage;
      const petData = PET_DATA[gameState.petType];
      const stageName = petData.stages[stage];
      
      const emojiEl = document.getElementById('petEmoji');
      emojiEl.textContent = petData.emojis[stage + 1] || petData.emojis[1];
      
      const pet = document.getElementById('pet');
      pet.classList.add('evolving');
      
      // 华丽的进化动画
      pet.style.transition = 'all 0.5s ease';
      pet.style.transform = 'translate(-50%, -50%) scale(1.5)';
      pet.style.filter = 'brightness(2)';
      
      // 创建进化特效
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const x = 100 + Math.cos(angle) * 80;
        const y = 150 + Math.sin(angle) * 80;
        createEffect('✨', x, y);
      }
      
      setTimeout(() => {
        pet.style.transform = 'translate(-50%, -50%) scale(1)';
        pet.style.filter = '';
        pet.classList.remove('evolving');
        updatePetAppearance();
      }, 500);
      
      addLog(`🧬 进化了！变成了${stageName}！`);
      showStatus('进化了！');
    }
    
    // ========== 奇遇系统 ==========
    function triggerAdventure() {
      if (gameState.isSleeping) return;
      
      const luckRoll = Math.random() * 100;
      let rarity = 'common';
      if (luckRoll < 2) rarity = 'epic';
      else if (luckRoll < 10) rarity = 'rare';
      else if (luckRoll < 40) rarity = 'uncommon';
      
      const available = ADVENTURES.filter(a => a.rarity === rarity);
      const adventure = available[Math.floor(Math.random() * available.length)] || ADVENTURES[0];
      
      for (const [stat, value] of Object.entries(adventure.effects)) {
        if (gameState[stat] !== undefined) {
          if (stat === 'coins') {
            gameState[stat] += value;
          } else if (stat === 'happiness' || stat === 'energy' || stat === 'hunger') {
            gameState[stat] = Math.min(100, gameState[stat] + value);
          } else if (stat === 'exp') {
            gameState[stat] += value;
          }
        }
      }
      
      showAdventurePopup(adventure);
      addLog(`${adventure.icon} ${adventure.text}`);
      showStatus(adventure.icon);
    }
    
    function showAdventurePopup(adventure) {
      if (document.hidden) return;
      
      const rarityColors = {
        common: '#a0a0b0',
        uncommon: '#54a0ff',
        rare: '#5f27cd',
        epic: '#feca57'
      };
      
      const popup = document.createElement('div');
      popup.className = 'adventure-popup';
      popup.style.borderColor = rarityColors[adventure.rarity];
      popup.innerHTML = `
        <div style="display: flex; align-items: center; gap: 16px;">
          <div style="font-size: 2.5rem;">${adventure.icon}</div>
          <div style="flex: 1;">
            <div style="font-weight: 700; color: ${rarityColors[adventure.rarity]}; font-size: 1rem;">${adventure.name}</div>
            <div style="color: #ccc; margin-top: 3px; font-size: 0.9rem;">${adventure.text}</div>
          </div>
        </div>
      `;
      
      document.body.appendChild(popup);
      setTimeout(() => {
        popup.style.animation = 'slideDownFade 0.4s ease forwards';
        setTimeout(() => popup.remove(), 400);
      }, 5000);
    }
    
    // ========== 任务系统 ==========
    function initQuests() {
      gameState.quests = {};
      DAILY_QUESTS.forEach(q => {
        gameState.quests[q.id] = { current: 0, target: q.target, completed: false };
      });
      updateQuestUI();
    }
    
    function updateQuestProgress(action) {
      const quest = gameState.quests[action];
      if (quest && !quest.completed) {
        quest.current = Math.min(quest.target, quest.current + 1);
        if (quest.current >= quest.target) {
          quest.completed = true;
          const q = DAILY_QUESTS.find(q => q.id === action);
          gameState.coins += q.reward;
          addLog(`✅ 完成任务：${q.name}！获得 ${q.reward} 金币`);
          showStatus('任务完成！');
        }
        updateQuestUI();
      }
    }
    
    function updateQuestUI() {
      const container = document.getElementById('questList');
      container.innerHTML = DAILY_QUESTS.map(q => {
        const quest = gameState.quests[q.id];
        const progress = quest ? quest.current : 0;
        const percent = (progress / q.target * 100);
        
        return `
          <div class="quest-item" style="${quest.completed ? 'opacity: 0.5;' : ''}">
            <div class="quest-name">${q.icon} ${q.name} ${quest.completed ? '✅' : ''}</div>
            <div class="quest-progress">${progress}/${q.target}</div>
            <div class="quest-progress-bar">
              <div class="quest-progress-fill" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // ========== 商店系统 ==========
    function initShop() {
      const grid = document.getElementById('shopGrid');
      grid.innerHTML = SHOP_ITEMS.map(item => `
        <div class="shop-item" onclick="buyItem('${item.id}')">
          <div class="shop-item-info">
            <span class="shop-item-icon">${item.icon}</span>
            <div>
              <div style="font-weight: 600; font-size: 0.85rem;">${item.name}</div>
              <div style="font-size: 0.7rem; color: var(--text-muted);">${item.effect}</div>
            </div>
          </div>
          <span class="shop-item-price">💰 ${item.price}</span>
        </div>
      `).join('');
    }
    
    function buyItem(itemId) {
      const item = SHOP_ITEMS.find(i => i.id === itemId);
      if (!item) return;
      
      if (gameState.coins < item.price) {
        addLog('💸 金币不足！');
        showStatus('金币不足！');
        return;
      }
      
      gameState.coins -= item.price;
      
      if (item.id === 'treat') {
        gameState.hunger = Math.min(100, gameState.hunger + 20);
      } else if (item.id === 'toy_ball') {
        gameState.happiness = Math.min(100, gameState.happiness + 10);
      }
      
      addLog(`🛒 购买了 ${item.icon} ${item.name}！`);
      showStatus(`获得 ${item.icon}！`);
      updateUI();
    }
    
    // ========== UI 更新 ==========
    function updateUI() {
      const now = Date.now();
      if (now - uiUpdateThrottle < 100) return;
      uiUpdateThrottle = now;
      
      const expPercent = (gameState.exp / gameState.maxExp * 100);
      const intimacyPercent = gameState.intimacy;
      
      // 更新宠物外观（根据心情）
      updatePetAppearance();
      
      // 计算距离下次进化还需多少级
      const nextEvoLevel = gameState.stage === 0 ? 3 : (gameState.stage === 1 ? 10 : 20);
      const levelsToEvo = Math.max(0, nextEvoLevel - gameState.level);
      const evoText = levelsToEvo > 0 ? `距离进化：还需 ${levelsToEvo} 级` : '可以进化了！';
      const evoEl = document.getElementById('evoProgress');
      if (evoEl) evoEl.textContent = evoText;
      
      const updates = {
        'petLevel': `Lv.${gameState.level}`,
        'expText': `${Math.floor(gameState.exp)}/${gameState.maxExp}`,
        'expBar': expPercent + '%',
        'happinessValue': Math.floor(gameState.happiness),
        'happinessBar': gameState.happiness + '%',
        'hungerValue': Math.floor(gameState.hunger),
        'hungerBar': gameState.hunger + '%',
        'energyValue': Math.floor(gameState.energy),
        'energyBar': gameState.energy + '%',
        'intimacyText': `${Math.floor(gameState.intimacy)}/100`,
        'intimacyBar': intimacyPercent + '%',
        'coinDisplay': gameState.coins
      };
      
      for (const [id, value] of Object.entries(updates)) {
        const el = document.getElementById(id);
        if (el) {
          if (id.includes('Bar')) {
            el.style.width = value;
          } else {
            el.textContent = value;
          }
        }
      }
    }
    
    // 更新宠物外观
    function updatePetAppearance() {
      const pet = document.getElementById('pet');
      const petData = PET_DATA[gameState.petType];
      
      // 移除所有状态类
      pet.classList.remove('happy', 'tired', 'sad', 'normal');
      
      // 根据心情设置外观
      if (gameState.happiness >= 80) {
        pet.classList.add('happy');
      } else if (gameState.happiness <= 30) {
        pet.classList.add('sad');
      }
      
      if (gameState.energy <= 30) {
        pet.classList.add('tired');
      }
      
      // 更新阶段光环
      const stageRing = document.getElementById('petStageRing');
      if (stageRing) {
        stageRing.textContent = petData.stages[gameState.stage];
        stageRing.style.background = `linear-gradient(135deg, ${petData.colors[gameState.stage]}, ${petData.colors[(gameState.stage + 1) % 4]})`;
      }
      
      // 根据等级调整大小
      const sizeMultiplier = 1 + (gameState.level - 1) * 0.01; // 每级大 1%
      const emojiEl = document.getElementById('petEmoji');
      if (emojiEl) {
        emojiEl.style.fontSize = (140 * sizeMultiplier) + 'px';
      }
    }
    
    function showStatus(text) {
      const bubble = document.getElementById('statusBubble');
      bubble.textContent = text;
      bubble.style.opacity = '1';
      bubble.style.display = 'block';
      
      if (bubble._timeout) clearTimeout(bubble._timeout);
      bubble._timeout = setTimeout(() => {
        bubble.style.opacity = '0';
        setTimeout(() => bubble.style.display = 'none', 200);
      }, 2000);
    }
    
    function addLog(message) {
      const container = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${time}</span>${message}`;
      
      container.insertBefore(entry, container.firstChild);
      
      while (container.children.length > 30) {
        container.removeChild(container.lastChild);
      }
    }
    
    // ========== 存档系统 ==========
    function saveGame() {
      gameState.lastSaveTime = Date.now();
      localStorage.setItem('aiPetGame_v4', JSON.stringify(gameState));
    }
    
    function loadGame() {
      // 清除旧版本存档，避免数据冲突
      localStorage.removeItem('aiPetGame_v3');
      localStorage.removeItem('aiPetGame_v2');
      localStorage.removeItem('aiPetGame');
      
      const saved = localStorage.getItem('aiPetGame_v4');
      if (saved) {
        try {
          const savedData = JSON.parse(saved);
          gameState = { ...gameState, ...savedData };
          
          // 确保 stage 至少是 1（修复旧存档）
          if (gameState.stage < 1) gameState.stage = 1;
          
          const offlineRewards = calculateOfflineRewards();
          
          document.getElementById('createModal').style.display = 'none';
          document.getElementById('petName').textContent = gameState.petName;
          
          const petData = PET_DATA[gameState.petType];
          document.getElementById('petEmoji').textContent = petData.emojis[gameState.stage + 1] || petData.emojis[1];
          
          if (offlineRewards.show) {
            showOfflineRewards(offlineRewards);
          }
          
          initQuests();
          initShop();
          updateUI();
          startGame();
          
          addLog(`👋 欢迎回来！${gameState.petName} 很想你～`);
        } catch (e) {
          console.error('加载失败:', e);
          localStorage.removeItem('aiPetGame_v4');
        }
      }
    }
    
    function calculateOfflineRewards() {
      const now = Date.now();
      const lastSave = gameState.lastSaveTime || now;
      const offlineSeconds = (now - lastSave) / 1000;
      
      if (offlineSeconds < 60) return { show: false };
      
      const cappedTime = Math.min(offlineSeconds, 8 * 3600);
      const hours = (cappedTime / 3600).toFixed(1);
      
      return {
        show: true,
        hours,
        exp: Math.floor(cappedTime * 0.05),
        coins: Math.floor(cappedTime * 0.03),
        happiness: -Math.floor(cappedTime * 0.001)
      };
    }
    
    function showOfflineRewards(rewards) {
      const overlay = document.createElement('div');
      overlay.className = 'offline-rewards';
      overlay.innerHTML = `
        <h2>🎁 离线收益</h2>
        <p style="color: var(--text-muted); margin-bottom: 16px;">离开期间 (${rewards.hours}小时)，你的宠物获得了：</p>
        <div class="rewards-list">
          <div class="reward-item">⭐ 经验 +${rewards.exp}</div>
          <div class="reward-item">💰 金币 +${rewards.coins}</div>
        </div>
        <button class="btn-start" onclick="this.parentElement.remove()">领取奖励</button>
      `;
      
      document.body.appendChild(overlay);
      
      gameState.exp += rewards.exp;
      gameState.coins += rewards.coins;
      gameState.happiness = Math.max(0, gameState.happiness + rewards.happiness);
    }
    
    // ========== 初始化 ==========
    initParticles();
    loadGame();
    
    // 点击宠物互动
    document.getElementById('pet').addEventListener('click', function(e) {
      if (!gameState.isSleeping) {
        const rect = this.getBoundingClientRect();
        const containerRect = document.getElementById('petContainer').getBoundingClientRect();
        const x = e.clientX - containerRect.left;
        const y = e.clientY - containerRect.top;
        
        // 点击特效
        createEffect('💕', x - 20, y - 20);
        createEffect('✨', x + 10, y - 30);
        
        // 播放跳跃动画
        this.classList.remove('idle');
        this.classList.add('anim-play');
        setTimeout(() => {
          this.className = 'pet idle';
        }, 300);
        
        // 增加亲密度和經驗
        gameState.intimacy = Math.min(100, gameState.intimacy + 1);
        gameState.coins += 1;
        gameState.happiness = Math.min(100, gameState.happiness + 2);
        gameState.exp += 2; // 点击也给经验
        checkLevelUp();
        
        const petData = PET_DATA[gameState.petType];
        const dialogues = PET_DIALOGUES[gameState.petType];
        showStatus(getRandomDialogue(dialogues.play));
        
        updateUI();
      }
    });
  </script>
</body>
</html>
